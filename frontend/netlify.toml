[build]
  command = "npm run build"
  publish = "dist"

# SPA redirect — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Prevent caching of index.html (ensures latest JS/CSS bundles load)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# Cache static assets aggressively (they have content hashes in filenames)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
